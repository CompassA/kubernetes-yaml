---
### master配置
kind: ConfigMap
apiVersion: v1
metadata:
  name: mysql-master-cnf
  namespace: tomato
data:
  # mysql主节点配置文件
  master.cnf: |
    [mysqld]
    innodb_file_per_table=1               # 一张表一个文件
    innodb_buffer_pool_size=256M          # 内存池大小
    #innodb_log_files_in_group=4          # redolog文件数, mysql8.0不推荐使用
    #innodb_log_file_size=1G              # redolog单个文件大小,mysql8.0不推荐使用
    innodb_redo_log_capacity=4294967296   # redolog大小
    innodb_flush_log_at_trx_commit=1      # redolog刷盘策略
    max_connections=10000                 # 最大连接数
    default-time_zone='+8:00'             # 时区
    lower_case_table_names=1

    ######################### binlog配置 ################################
    server-id=1                           # 服务ID
    gtid_mode=on                          # 开启G-TID
    enforce-gtid-consistency=true         # 强制GTID一致性, 防止非GTID事务的复制
    log_replica_updates=1                 # 确保从服务器也会记录二进制日志

    log-bin=mysql-bin                     # 启用二进制日志，用于主从复制
    # binlog_format=ROW                   # BINLOG格式 ROW, mysql8.0后的版本默认为ROW, 不需要配置

    binlog_cache_size=1M                  # 设置二进制日志的缓存大小，影响二进制日志的写入性能
    max_binlog_size=300M                  # 设置二进制日志的最大大小，当二进制日志达到这个大小后会自动滚动并创建新的日志文件
    binlog_expire_logs_seconds = 604800   # binlog过期时间 7天

    [client]
    # socket=/var/run/mysqld/mysqld.sock

  ## 定义存储过程, 创建主从复制账号
  create_replication_account_procedure.sql: |
    USE mysql;

    delimiter //

    CREATE PROCEDURE IF NOT EXISTS CreateDumpUser(IN username VARCHAR(512), IN userpassword VARCHAR(512))
    BEGIN
        DECLARE user_exists INT;

        SELECT COUNT(*) INTO user_exists FROM mysql.user WHERE user = username;
        
        IF user_exists = 0 THEN
            -- 创建用户
            SET @create_user_sql = CONCAT('CREATE USER ''', username, '''@''%'' IDENTIFIED WITH caching_sha2_password by ''', userpassword, '''');
            PREPARE create_user_stmt FROM @create_user_sql;
            EXECUTE create_user_stmt;
            DEALLOCATE PREPARE create_user_stmt;
            SELECT CONCAT('create user:', username, ' success') AS message;

            -- 授予复制权限
            SET @grant_sql = CONCAT('GRANT replication slave ON *.* TO ''', username, '''@''%''');
            PREPARE grant_stmt FROM @grant_sql;
            EXECUTE grant_stmt;
            DEALLOCATE PREPARE grant_stmt;
            SELECT CONCAT('grant replication slave to user:', username, ' success');
            
        
            flush privileges;
        ELSE
            SELECT CONCAT('user:', username, ' already exists') AS message;
        END IF;
    END // 

    DELIMITER ;

  # 主节点sidecar初始化
  master_sidecar.sh: |
    set -ex

    # 等待mysql节点启动完成
    until mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"; do
    echo "Waiting for mysql to be ready"
    sleep 5
    done

    # 创建主从复制账号与密码
    mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e "$(</mnt/configmap/create_replication_account_procedure.sql)"
    mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e "call mysql.CreateDumpUser('$MYSQL_MASTER_DUMP_USER', '$MYSQL_MASTER_DUMP_PASSWORD')"
    echo "mysql-master sidecar-task finished"

    # 启动xtrabackup监听
    exec ncat --listen --keep-open --send-only --max-conns=1 3307 -c \
    "xtrabackup --backup --slave-info --stream=xbstream --host=127.0.0.1 --user=root --password=$MYSQL_ROOT_PASSWORD"
---
## 配置mysql root密码, 正常情况下, 需单独配置
apiVersion: v1
kind: Secret
metadata:
  name: mysql-master-secret
  namespace: tomato
type: Opaque
data:
  # echo -n 'root' | base64
  MYSQL_ROOT_PASSWORD: cm9vdA==

  # 主从复制账号名称   echo -n 'master0' | base64
  MYSQL_MASTER_DUMP_USER: bWFzdGVyMA==

  # 主从复制账号密码   echo -n 'Master@' | base64
  MYSQL_MASTER_DUMP_PASSWORD: TWFzdGVyQA==
