# nginx.vh.default.conf  --  docker-openresty
#
# This file is installed to:
#   `/etc/nginx/conf.d/default.conf`
#
# It tracks the `server` section of the upstream OpenResty's `nginx.conf`.
#
# This config (and any other configs in `etc/nginx/conf.d/`) is loaded by
# default by the `include` directive in `/usr/local/openresty/nginx/conf/nginx.conf`.
#
# See https://github.com/openresty/docker-openresty/blob/master/README.md#nginx-config-files
#

# 运行于docker中
## docker run -d -t -i --name openresty -p 80:80 -p 443:443 -v E:\code\kubernetes-yaml\openresty\conf.d:/etc/nginx/conf.d -v D:\docker\html:/usr/local/openresty/nginx/dev/html -v D:\docker\se:/usr/local/openresty/nginx/ssl openresty/openresty:1.27.1.2-5-alpine-fat

# 创建自签名证书
## 创建私钥
## openssl genpkey -algorithm RSA -out D:\docker\se\name-private.key -pkeyopt rsa_keygen_bits:2048
## 生成签名(CSR) 
## openssl req -new -key D:\docker\se\name-private.key -out D:\docker\se\name-mycsr.csr
## 生成证书
## openssl req -x509 -key D:\docker\se\name-private.key -in D:\docker\se\name-mycsr.csr -out D:\docker\se\name-mycert.crt -days 36500
server {
    listen       80;
    server_name  guanyunxiao.gyx.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name guanyunxiao.gyx.cn;

    ssl_certificate /usr/local/openresty/nginx/ssl/name-mycert.crt;
    ssl_certificate_key /usr/local/openresty/nginx/ssl/name-private.key;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_ciphers HIGH:!aNull:!MD5;
    ssl_prefer_server_ciphers on;

    #charset koi8-r;
    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/local/openresty/nginx/dev/html/tomato_login;
        index  index.html index.htm;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/local/openresty/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           /usr/local/openresty/nginx/html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
